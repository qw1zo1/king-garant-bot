services:
  - type: web
    name: king-garant-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter
    healthCheckPath: /api/healthz
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: king-garant-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"

databases:
  - name: king-garant-db
    plan: free
    region: frankfurt
